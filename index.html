<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Wizualizacja</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="stage">
      <div class="label">
        <span>Nebula audio sketch</span>
      </div>
      <div class="player" aria-label="Odtwarzacz muzyki">
        <div class="track-info">
          <span class="track-kicker">Teraz gra</span>
          <strong id="track-title">Mnihimo's Journey</strong>
        </div>
        <select id="track-select" aria-label="Wybierz utwór"></select>
        <div class="transport">
          <button id="previous-track" type="button" aria-label="Poprzedni utwór">Wstecz</button>
          <button id="audio-toggle" type="button">Odtwórz</button>
          <button id="next-track" type="button" aria-label="Następny utwór">Dalej</button>
        </div>
        <div class="timeline">
          <span id="current-time">0:00</span>
          <input id="seek-bar" type="range" min="0" max="1000" value="0" aria-label="Przewiń utwór" />
          <span id="duration">0:00</span>
        </div>
      </div>
      <canvas id="webgl-canvas" aria-label="Kosmiczna wizualizacja audio"></canvas>
    </main>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
